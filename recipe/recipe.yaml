schema_version: 1

context:
  name: django-stubs
  version: "6.0.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 56d43b5e3741563af0063e5b6283f908c625b0439aa06314268673699d1bdccd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build >=0.10.0,<0.11.0
  run:
    - python >=${{ python_min }}
    - django
    - django-stubs-ext >=${{ version }}
    - tomli
    - typing_extensions >=4.11.0
    - types-pyyaml

tests:
  - python:
      imports:
        - django_stubs_ext
        - mypy_django_plugin
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Mypy stubs for Django
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/typeddjango/django-stubs

extra:
  recipe-maintainers:
    - thewchan
